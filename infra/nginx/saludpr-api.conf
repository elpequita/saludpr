# =============================================================================
# SaludPR — Nginx config for the API backend
# Place at: /etc/nginx/sites-available/saludpr-api
# Then: sudo ln -s /etc/nginx/sites-available/saludpr-api /etc/nginx/sites-enabled/
#       sudo certbot --nginx -d api.saludpr.org
# =============================================================================

# --- Rate limiting zone (100 req/min per IP) ---
limit_req_zone $binary_remote_addr zone=saludpr_api:10m rate=100r/m;

upstream saludpr_backend {
    server 127.0.0.1:8000 fail_timeout=5s max_fails=3;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.saludpr.org;

    # Certbot will populate this block for HTTPS.
    # ACME challenge path for Let's Encrypt renewals
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.saludpr.org;

    # --- TLS (Certbot will fill these in) ---
    # ssl_certificate /etc/letsencrypt/live/api.saludpr.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.saludpr.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Logging ---
    access_log /var/log/nginx/saludpr-api.access.log;
    error_log  /var/log/nginx/saludpr-api.error.log warn;

    # --- Compression ---
    gzip on;
    gzip_vary on;
    gzip_types application/json application/geo+json text/plain;
    gzip_min_length 1024;

    # --- Body limits ---
    client_max_body_size 2m;

    # --- Rate limiting ---
    limit_req zone=saludpr_api burst=50 nodelay;
    limit_req_status 429;

    # --- Reverse proxy to FastAPI ---
    location / {
        proxy_pass http://saludpr_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Let FastAPI's CORS middleware handle origin checks — don't double-handle here
    }

    # --- Health check (no rate limiting, no logging) ---
    location = /api/health {
        access_log off;
        proxy_pass http://saludpr_backend;
    }
}
